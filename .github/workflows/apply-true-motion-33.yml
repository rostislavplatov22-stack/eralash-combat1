name: Apply True Motion 33.0
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: ${{ contains(github.event.head_commit.message, '[auto-apply 33.0]') == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node apply-true-motion-33.mjs .
      - name: Commit generated True Motion integration
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "eralash-combat-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git reset -- '**/index.before-true-motion-33.0.html' || true
          git commit -m "[auto-apply 33.0] restore real fighter animation state machine"
          git push
