name: Apply Final Combat Polish 31.4
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: ${{ contains(github.event.head_commit.message, '[auto-apply 31.4]') == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node apply-hard-combat-31-4.mjs .
      - name: Commit generated final polish link
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "eralash-combat-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git reset -- '**/index.before-final-polish-31.4.html' || true
          git commit -m "[auto-apply 31.4] final combat scale intro and effects polish"
          git push
