name: Apply Premium Combat Director 32.0
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: ${{ contains(github.event.head_commit.message, '[auto-apply 32.0]') == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node apply-combat-director-32.mjs .
      - name: Commit generated combat director link
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "eralash-combat-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git reset -- '**/index.before-combat-director-32.0.html' || true
          git commit -m "[auto-apply 32.0] premium combat director"
          git push
