name: Apply Safe Renderer Recovery 31.5
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: ${{ contains(github.event.head_commit.message, '[auto-apply 31.5]') == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node apply-hard-combat-31-5.mjs .
      - name: Commit safe recovery link
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "eralash-combat-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git reset -- '**/index.before-safe-recovery-31.5.html' || true
          git commit -m "[auto-apply 31.5] restore arena and keep safe premium UI"
          git push
